services:
  postgres:
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical

  workspace-deps:
    build:
      context: ${SANDBOX_REPOSITORY_ROOT}
      dockerfile: apps/web/Dockerfile
      target: dev
    command:
      [
        "sh",
        "-lc",
        "if [ -f node_modules/.sandbox-pnpm-lock.yaml ] && cmp -s pnpm-lock.yaml node_modules/.sandbox-pnpm-lock.yaml; then exit 0; fi && pnpm install --frozen-lockfile && cp pnpm-lock.yaml node_modules/.sandbox-pnpm-lock.yaml",
      ]
    volumes:
      - ${SANDBOX_REPOSITORY_ROOT}:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store

  api:
    build:
      context: ${SANDBOX_REPOSITORY_ROOT}
      dockerfile: apps/api/Dockerfile
      target: dev
    command: ["sh", "-lc", "pnpm exec turbo run dev:sandbox --filter=api"]
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
    ports:
      - "${SANDBOX_API_PORT}:3001"
    volumes:
      - ${SANDBOX_REPOSITORY_ROOT}:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store

  auth:
    build:
      context: ${SANDBOX_REPOSITORY_ROOT}
      dockerfile: apps/auth/Dockerfile
      target: dev
    command: ["sh", "-lc", "pnpm exec turbo run dev:sandbox --filter=auth"]
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
    ports:
      - "${SANDBOX_AUTH_PORT}:3002"
    volumes:
      - ${SANDBOX_REPOSITORY_ROOT}:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store

  electric:
    build:
      context: ${SANDBOX_REPOSITORY_ROOT}
      dockerfile: apps/electric/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${SANDBOX_ENV_ELECTRIC_FILE}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test "$(curl -so /dev/null -w ''%{http_code}'' http://127.0.0.1:3000/v1/health)" = "200"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - "127.0.0.1:${SANDBOX_ELECTRIC_PORT}:3000"
    volumes:
      - electric-storage:/var/lib/electric/persistent

  web:
    build:
      context: ${SANDBOX_REPOSITORY_ROOT}
      dockerfile: apps/web/Dockerfile
      target: dev
    command: ["sh", "-lc", "pnpm exec turbo run dev:sandbox --filter=web"]
    depends_on:
      workspace-deps:
        condition: service_completed_successfully
    ports:
      - "${SANDBOX_WEB_PORT}:3000"
    volumes:
      - ${SANDBOX_REPOSITORY_ROOT}:/workspace
      - workspace-node-modules:/workspace/node_modules
      - pnpm-store:/pnpm/store

volumes:
  electric-storage:
